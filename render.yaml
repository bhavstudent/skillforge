services:
  - type: web
    name: skillforge-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: skillforge-db
          property: connectionString

  - type: web
    name: skillforge-frontend
    env: static
    buildCommand: cd student-ai && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://skillforge-backend.onrender.com

databases:
  - name: skillforge-db
    plan: free
    region: singapore